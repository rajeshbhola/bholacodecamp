<div class="sidebar">
  <div class="container sidebar-sticky">
    <div class="sidebar-about">
      <div>
        <a
          style="display: flex; justify-content: center; color: #ffde59;margin-top: 10px;"
          href="{{ site.baseurl }}"
          arial-label="Learn More"
          ><img src="/public/images/logo.webp" alt="bholaCodeCamp logo"  height="120" /></a>
      </div>
      <h1 class="fira-code-h1">
        <a href="{{ site.baseurl }}" arial-label="Learn More">
          {{ site.title }}
        </a>
      </h1>
      <a href="{{ site.github.repo }}">
        <img
          src="https://img.shields.io/badge/Created By-Rajesh Bhola-yellow"
          alt="Rajesh Bhola"
          height="32"
          arial-label="Learn More"
        /> </a
      ><br>
      <small style="color: rgb(161, 161, 161)">{{ site.description }}</small>
    </div>
    <hr>
    <nav class="sidebar-nav">
      <a
        class="sidebar-nav-item{% if page.url == site.baseurl %} active{% endif %}"
        href="{{ site.baseurl }}"
      >
        Home
      </a>
    
      {% assign pages_list = site.pages %}
      {% for node in pages_list %}
        {% if node.title != null %}
          {% if node.layout == "page" %}
            <a
              class="sidebar-nav-item{% if page.url == node.url %} active{% endif %}"
              href="{{ site.baseurl }}{{ node.url }}"
            >
              {{ node.title }}
            </a>
          {% endif %}
        {% endif %}
      {% endfor %}
    </nav>    
  </div>
</div>
