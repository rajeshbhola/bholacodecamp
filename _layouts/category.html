---
layout: page
# The Category layout
---

<div id="page-category">
  <h1 class="ps-lg-2">
    <i class="far fa-folder-open fa-fw text-muted"></i>
    {{ page.title }}
    <span class="lead text-muted ps-2">{{ page.posts | size }}</span>
  </h1>
  <br />

  <ol class="ps-0 posts">
    {% for post in page.posts %}
    <li class="archives-item">
      <a href="{{ post.url | relative_url }}" class="archive-link"
        ><b>{{ post.title }}</b></a
      >
    </li>
    {% endfor %}
  </ol>
</div>
