---
layout: page
# The layout for Tag page
---

<div id="page-tag">
  <h1 class="ps-lg-2">
    <i class="fa fa-tag fa-fw text-muted"></i>
    {{ page.title }}
    <span class="lead text-muted ps-2">{{ page.posts | size }}</span>
  </h1>
  <br />

  <ol class="posts">
    {% for post in page.posts %}
    <li class="archives-item">
      <a href="{{ post.url | relative_url }}" class="archive-link"
        ><b>{{ post.title }}</b></a
      >
    </li>
    {% endfor %}
  </ol>
</div>
